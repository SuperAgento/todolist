                                                                                        <button onClick={(e) => { e.stopPropagation(); handleDeleteCustomLink(key, lIdx); }} className="opacity-0 group-hover/link:opacity-100 text-rose-400 hover:text-rose-600 p-1 bg-rose-50 rounded transition-opacity">
                                                                                            <Icons.Trash size={14} />
                                                                                        </button>
                                                                                    </div>
                                                                                ))}
                                                                                {links.length === 0 && <p className="text-xs text-slate-400 italic pl-2">Chưa có nội dung nào.</p>}
                                                                            </div>

                                                                            {addingLinkTo === key && (
                                                                                <div className="mt-3 p-3 bg-slate-50 rounded-lg border border-rose-200 flex flex-col gap-2" onClick={e => e.stopPropagation()}>
                                                                                    <input type="text" placeholder={cat === 'Mục tiêu học tập' ? "Nhập mục tiêu..." : "Tên tài liệu / nội dung..."} className="text-sm px-3 py-2 border border-slate-200 rounded-md outline-none focus:border-rose-400 bg-white" value={newLinkName} onChange={e => setNewLinkName(e.target.value)} />
                                                                                    {cat === 'Tài liệu & Nội dung' && (
                                                                                        <input type="text" placeholder="Link URL (tuỳ chọn)" className="text-sm px-3 py-2 border border-slate-200 rounded-md outline-none focus:border-rose-400 bg-white" value={newLinkUrl} onChange={e => setNewLinkUrl(e.target.value)} />
                                                                                    )}
                                                                                    <div className="flex gap-2 justify-end mt-1">
                                                                                        <button onClick={() => setAddingLinkTo(null)} className="text-xs font-bold text-slate-500 hover:text-slate-700 px-3 py-1.5 rounded bg-white border border-slate-200 hover:bg-slate-100 transition-colors">Hủy</button>
                                                                                        <button onClick={() => handleAddCustomLink(key)} className="text-xs font-bold bg-rose-500 text-white px-4 py-1.5 rounded hover:bg-rose-600 transition-colors">Lưu lại</button>
                                                                                    </div>
                                                                                </div>
                                                                            )}
                                                                        </div>
                                                                    );
                                                                })}
                                                            </div>
                                                        </div>
                                                    </div>
                                                )}

                                                {topic.isUniContainer && (
                                                    <div className="mt-6 pt-4 border-t border-slate-100 animate-fade-in-down space-y-4">
                                                        {topic.subjects.map(subject => (
                                                            <div key={subject} className="bg-slate-50/80 rounded-xl overflow-hidden border border-slate-200">
                                                                <div className="px-4 py-3 bg-slate-100/50 border-b border-slate-200 flex items-center gap-2">
                                                                    <Icons.BookOpen size={18} className="text-amber-600" />
                                                                    <h4 className="font-bold text-slate-800 text-sm">{subject}</h4>
                                                                </div>
                                                                <div className="p-4 space-y-4">
                                                                    {['Trên lớp', 'Bổ sung'].map(cat => {
                                                                        const key = `${subject}_${cat}`;
                                                                        const links = customLinks[key] || [];
                                                                        return (
                                                                            <div key={cat} className="bg-white rounded-xl p-3 border border-slate-200 shadow-sm">
                                                                                <div className="flex justify-between items-center mb-3">
                                                                                    <h4 className="text-xs font-bold text-slate-600 uppercase tracking-widest flex items-center gap-1.5">
                                                                                        {cat === 'Trên lớp' ? <Icons.BookOpen size={14} className="text-cyan-600" /> : <Icons.Plus size={14} className="text-cyan-600" />}
                                                                                        {cat}
                                                                                    </h4>
                                                                                    <button onClick={(e) => { e.stopPropagation(); setAddingLinkTo(addingLinkTo === key ? null : key); setNewLinkName(''); setNewLinkUrl(''); }} className="text-xs text-cyan-600 hover:text-cyan-700 font-bold px-2 py-1 bg-cyan-50 rounded hover:bg-cyan-100 transition-colors">
                                                                                        + Thêm
                                                                                    </button>
                                                                                </div>

                                                                                <div className="space-y-2">
                                                                                    {links.map((link, lIdx) => (
                                                                                        <div key={lIdx} className={`flex items-center gap-2 p-2 rounded-lg border ${link.completed ? 'bg-emerald-50/50 border-emerald-200/50' : 'border-transparent hover:border-slate-200 hover:bg-slate-50'} transition-all group/link relative`} onClick={e => e.stopPropagation()}>
                                                                                            <button onClick={() => toggleLinkCompletion(key, lIdx)} className={`w-5 h-5 rounded-full border-2 flex items-center justify-center transition-colors flex-shrink-0 ${link.completed ? 'bg-emerald-100 border-emerald-500' : 'border-slate-300 hover:border-emerald-400'}`}>
                                                                                                {link.completed && <Icons.CheckCircle size={12} className="text-emerald-600" />}
                                                                                            </button>
                                                                                            {link.url ? (
                                                                                                <a href={link.url} target="_blank" rel="noopener noreferrer" className={`flex-1 truncate text-sm font-medium transition-colors ${link.completed ? 'text-slate-400 line-through' : 'text-slate-600 hover:text-cyan-700'}`}>
                                                                                                    {link.name}
                                                                                                </a>
                                                                                            ) : (
                                                                                                <span className={`flex-1 text-sm font-medium transition-colors ${link.completed ? 'text-slate-400 line-through' : 'text-slate-600'}`}>
                                                                                                    {link.name}
                                                                                                </span>
                                                                                            )}
                                                                                            <button onClick={(e) => { e.stopPropagation(); handleDeleteCustomLink(key, lIdx); }} className="opacity-0 group-hover/link:opacity-100 text-rose-400 hover:text-rose-600 p-1 bg-rose-50 rounded transition-opacity">
                                                                                                <Icons.Trash size={14} />
                                                                                            </button>
                                                                                        </div>
                                                                                    ))}
                                                                                    {links.length === 0 && <p className="text-xs text-slate-400 italic pl-2">Chưa có tài liệu nào.</p>}
                                                                                </div>

                                                                                {addingLinkTo === key && (
                                                                                    <div className="mt-3 p-3 bg-slate-50 rounded-lg border border-cyan-200 flex flex-col gap-2" onClick={e => e.stopPropagation()}>
                                                                                        <input type="text" placeholder="Tên tài liệu..." className="text-sm px-3 py-2 border border-slate-200 rounded-md outline-none focus:border-cyan-400 bg-white" value={newLinkName} onChange={e => setNewLinkName(e.target.value)} />
                                                                                        <input type="text" placeholder="Link URL (tuỳ chọn)" className="text-sm px-3 py-2 border border-slate-200 rounded-md outline-none focus:border-cyan-400 bg-white" value={newLinkUrl} onChange={e => setNewLinkUrl(e.target.value)} />
                                                                                        <div className="flex gap-2 justify-end mt-1">
                                                                                            <button onClick={() => setAddingLinkTo(null)} className="text-xs font-bold text-slate-500 hover:text-slate-700 px-3 py-1.5 rounded bg-white border border-slate-200 hover:bg-slate-100 transition-colors">Hủy</button>
                                                                                            <button onClick={() => handleAddCustomLink(key)} className="text-xs font-bold bg-cyan-600 text-white px-4 py-1.5 rounded hover:bg-cyan-700 transition-colors">Lưu lại</button>
                                                                                        </div>
                                                                                    </div>
                                                                                )}
                                                                            </div>
                                                                        );
                                                                    })}
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}

                                                <div className="mt-4 flex justify-end">
                                                    <button onClick={(e) => { e.stopPropagation(); toggleTopic(idx); }} className="text-xs font-bold text-slate-400 hover:text-slate-700 uppercase tracking-widest px-3 py-1.5 bg-slate-100 rounded-lg hover:bg-slate-200 transition-colors">
                                                        Đóng lại
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
